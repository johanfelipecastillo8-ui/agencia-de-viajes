<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../css/Destinos.css">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>FlyGo - Destinos</title>
</head>
<body>
    <section class="destinos">
    <h2>Nuestros Destinos</h2>
    <p class="subtitulo">Descubre los lugares más increíbles para tus próximas vacaciones</p>

    <div class="contenedor-destinos">

        <div class="destino">
            <img src="img/photo-1507525428034-b723cf961d3e.jpg" alt="Playa">
            <div class="info">
                <h3>Caribe</h3>
                <p>Playas paradisíacas y aguas cristalinas.</p>
                <button>Ver más</button>
            </div>
        </div>

        <div class="destino">
            <img src="img/photo-1501785888041-af3ef285b470.jpg" alt="Montaña">
            <div class="info">
                <h3>Suiza</h3>
                <p>Montañas impresionantes y paisajes únicos.</p>
                <button>Ver más</button>
            </div>
        </div>

        <div class="destino">
            <img src="img/photo-1502602898657-3e91760cbb34.avif" alt="Ciudad">
            <div class="info">
                <h3>París</h3>
                <p>La ciudad del amor y la cultura.</p>
                <button>Ver más</button>
            </div>
        </div>

    </div>
</section>
    
</body>
</html>
