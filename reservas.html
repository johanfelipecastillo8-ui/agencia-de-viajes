<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/reservas.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Reservar Viaje</title>
</head>
<header>
<nav class="navbar">

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <a href="#" class="nav-logo">
            <h2 class="nav-text">🛩️ FlyGo</h2>
        </a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="./index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="./reservas.html" class="nav-link">Reservas</a></li>
            <li class="nav-item"><a href="./destinos.html" class="nav-link">Destinos</a></li>
            <li class="nav-item"><a href="./contactenos.html" class="nav-link">Contáctenos</a></li>
        </ul>
    </nav>
<body>

<section class="reservas">
    <h2>Reserva tu Viaje</h2>
    <p>Planifica tu próxima aventura con nosotros</p>

    <form class="form-reserva">

        <div class="campo">
            <label>Destino</label>
            <input type="text" placeholder="Ej: Cancún, París, Cartagena">
        </div>

        <div class="campo">
            <label>Fecha de salida</label>
            <input type="date">
        </div>

        <div class="campo">
            <label>Fecha de regreso</label>
            <input type="date">
        </div>

        <div class="campo">
            <label>Número de personas</label>
            <select>
                <option>1 Persona</option>
                <option>2 Personas</option>
                <option>3 Personas</option>
                <option>4 Personas</option>
                <option>5+ Personas</option>
            </select>
        </div>

        <div class="campo">
            <label>Tipo de viaje</label>
            <select>
                <option>Turismo</option>
                <option>Aventura</option>
                <option>Negocios</option>
                <option>Luna de miel</option>
            </select>
        </div>

        <button type="submit">Reservar Ahora</button>

    </form>
</section>
</body>

    <script>
        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 40);
        });

        // Reveal on scroll
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.12 });

        reveals.forEach(el => observer.observe(el));

        // Card CTA click
        document.querySelectorAll('.card-cta').forEach(btn => {
            btn.addEventListener('click', () => {
                const title = btn.closest('.destino-card').querySelector('.card-title').textContent;
                alert(`Próximamente: más información sobre ${title} 🌍`);
            });
        });
    </script>
</html>
