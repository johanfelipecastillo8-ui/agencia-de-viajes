<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contáctenos | FlyGo</title>

    <link rel="stylesheet" href="./css/contactenos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>
<header>

    <div class="logo">
        <img src="img/logo.png" width="40">
        FlyGo
    </div>

    <nav>
    <ul>
    <li><a href="./index.html">Home</a></li>
    <li><a href="./reservas.html">Reservas</a></li>
    <li><a href="./destinos.html">Sitios Turísticos</a></li>
    <li><a href="./contactenos.html">Contáctenos</a></li>
    </ul>
    </nav>

    <div class="user-icon">
        <i class="fa-regular fa-user"></i>
    </div>

</header>

    <main>

        <section class="contact-section">

            <h1>Contáctanos</h1>

            <p>Si tienes alguna pregunta sobre nuestros viajes, escríbenos.</p>

            <form class="contact-form">

                <input type="text" placeholder="Nombre completo" required>

                <input type="email" placeholder="Correo electrónico" required>

                <input type="text" placeholder="Destino de interés">

                <textarea placeholder="Escribe tu mensaje..." rows="5"></textarea>

                <button type="submit">Enviar mensaje</button>

            </form>

        </section>

    </main>

</body>

</html>
